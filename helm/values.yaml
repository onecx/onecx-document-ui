app:
  name: ui
  image:
    repository: onecx/onecx-document-ui
  routing:
    enabled: true
    path: /mfe/onecxDocumentUi/
  operator:
    microfrontend:
      enabled: true
      specs:
        main:
          exposedModule: ./OnecxDocumentUiModule
          description: OneCX OnecxDocumentUi Module
          note: OneCX OnecxDocumentUi UI module auto import via MF operator
          type: MODULE
          technology: WEBCOMPONENTMODULE
          remoteName: onecx-document-ui
          tagName: onecx-document-ui-webcomponent
          endpoints:
            - name: Document search
              path: /document
            - name: Document quick upload
              path: /document/quick-upload
            - name: Document create
              path: /document/create-document
            - name: Document details
              path: /document/details/{documentId}
    permission:
      enabled: true
      spec:
        permissions:
          DOCUMENT:
            READ: Read documents
            WRITE: Write document data
            DELETE: Delete document data
